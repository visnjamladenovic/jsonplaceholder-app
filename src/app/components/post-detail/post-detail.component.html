<div class="breadcrumb">
  <a routerLink="/posts">← Svi postovi</a>
  <span>/</span>
  <span>Post #{{ post?.id }}</span>
</div>

<div class="loading-state" *ngIf="loading">
  <div class="spinner"></div>
  <p>Učitavanje...</p>
</div>

<div class="error-state" *ngIf="error">
  <span>❌ {{ error }}</span>
  <a routerLink="/posts" class="btn btn-outline">Nazad na listu</a>
</div>

<div class="detail-card" *ngIf="post && !loading">
  <div class="detail-header">
    <div class="meta">
      <span class="post-id">#{{ post.id }}</span>
      <span class="user-badge">Korisnik {{ post.userId }}</span>
    </div>
    <div class="actions">
      <a [routerLink]="['/posts', post.id, 'edit']" class="btn btn-edit">✏️ Uredi</a>
      <button class="btn btn-danger" (click)="showDeleteConfirm = true">🗑 Obriši</button>
    </div>
  </div>

  <h1 class="post-title">{{ post.title }}</h1>

  <div class="divider"></div>

  <div class="post-content">
    <p>{{ post.body }}</p>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" *ngIf="showDeleteConfirm" (click)="showDeleteConfirm = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-icon">⚠️</div>
    <h3>Potvrdi brisanje</h3>
    <p>Da li ste sigurni da želite obrisati ovaj post? Akcija se ne može poništiti.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" (click)="showDeleteConfirm = false">Odustani</button>
      <button class="btn btn-danger" (click)="deletePost()">Da, obriši</button>
    </div>
  </div>
</div>
